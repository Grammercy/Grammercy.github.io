<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grammercy Fourierify</title>
    <meta
      name="description"
      content="Embedded Fourierify website tab inside the Grammercy project site."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell" data-transition-shell>
      <nav class="site-tabs" aria-label="Site sections">
        <a class="site-tab" href="../">Project Registry</a>
        <a class="site-tab" href="../chemistry/">Chemistry Simulator</a>
        <a class="site-tab is-active" href="./" aria-current="page">Fourierify</a>
      </nav>

      <main class="layout">
        <header class="hero">
          <p class="eyebrow">Embedded Project</p>
          <h1>Fourierify Website</h1>
          <p class="lede">
            This tab loads the actual Fourierify website directly inside your main site.
          </p>
          <div class="hero-actions">
            <a class="button button-primary" href="./app/">
              Open full tab view
            </a>
            <a
              class="button button-secondary"
              href="https://github.com/Grammercy/fourierify"
              target="_blank"
              rel="noreferrer"
            >
              Open GitHub repo
            </a>
          </div>
        </header>

        <section class="panel embed-panel" aria-label="Fourierify app frame">
          <iframe
            class="app-frame"
            src="./app/"
            title="Fourierify Website"
            loading="eager"
          ></iframe>
        </section>
      </main>
    </div>

    <script src="../page-transition.js"></script>
  </body>
</html>
